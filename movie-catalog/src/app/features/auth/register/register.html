<section class="auth-section">
  <div class="auth-card">
    <h2>Create Account</h2>

    <form>
      <div class="form-group">
        <label>Email</label>

        <input type="email" />
      </div>

      <div class="form-group">
        <label>Password</label>

        <input type="password" />
      </div>

      <div class="form-group">
        <label>Repeat Password</label>

        <input type="password" />
      </div>

      <button class="btn btn-primary">Register</button>
    </form>
  </div>
</section>
