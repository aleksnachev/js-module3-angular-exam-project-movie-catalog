<div class="details-wrapper">
  @if (movie()) {
    <div class="details-card">
      <div class="details-image">
        <img [src]="movie()!.imageUrl" [alt]="movie()!.title" />
      </div>

      <div class="details-info">
        <div class="header-with-like">
          <h1>
            {{ movie()!.title }}
          </h1>
          <button
            class="like-btn-detail"
            [class.liked]="isLiked()"
            (click)="onLikeClick()"
            [disabled]="isLiking"
            [title]="isLiked() ? 'Unlike' : 'Like'"
          >
            {{ isLiked() ? '❤️ ' : '🤍 ' }} {{ movie()!.likes?.length || 0 }}
          </button>
        </div>

        <div class="meta">
          <span> 🎬 {{ movie()!.genre }} </span>

          <span> 📅 {{ movie()!.year }} </span>
        </div>

        <p class="description">
          {{ movie()!.description }}
        </p>

        <div class="owner">
          Added by:

          <span>
            {{ movie()!.ownerId.username }}
          </span>
        </div>

        @if (isOwner()) {
          <div class="actions">
            <a [routerLink]="['/movies/edit', movie()!._id]" class="edit-btn"> Edit </a>

            <button (click)="onDelete()" class="danger-btn" [disabled]="isDeleting">
              {{ isDeleting ? 'Deleting...' : 'Delete' }}
            </button>
          </div>
        }
      </div>
    </div>
  } @else {
    <p>Loading...</p>
  }
</div>
